<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatStreams</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: #0a0a0f;
            background-image: url('images/landing.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(10,10,15,0.9), rgba(10,10,15,0.75));
        }
        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 80px;
            letter-spacing: 10px;
            background: linear-gradient(90deg, #f0522a, #ff8c42);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            animation: fadeUp 0.8s ease both;
        }
        .tagline {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 6px;
            color: rgba(240,237,232,0.4);
            margin-top: 12px;
            animation: fadeUp 0.8s ease 0.2s both;
        }
        .buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 52px;
            animation: fadeUp 0.8s ease 0.4s both;
        }
        .btn {
            padding: 14px 40px;
            border-radius: 50px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 3px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s;
        }
        .btn-primary {
            background: linear-gradient(90deg, #f0522a, #ff8c42);
            color: white;
            border: none;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(240,82,42,0.4); }
        .btn-secondary {
            background: transparent;
            color: #f0ede8;
            border: 1px solid rgba(240,237,232,0.2);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.07); transform: translateY(-2px); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">BeatStreams</div>
        <div class="tagline">YOUR MUSIC UNIVERSE</div>
        <div class="buttons">
            <a href="login.html" class="btn btn-primary">Login</a>
            <a href="register.html" class="btn btn-secondary">Register</a>
        </div>
    </div>
</body>
</html>
